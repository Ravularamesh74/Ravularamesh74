name: Advanced Contribution Snake

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake Animations
        uses: Platane/snk@v3
        with:
          github_user_name: Ravularamesh74

          outputs: |
            # 🔥 Default light theme
            dist/github-snake.svg

            # 🌙 Dark theme
            dist/github-snake-dark.svg?palette=github-dark

            # ⚡ Neon green hacker style
            dist/github-snake-neon.svg?color_snake=#00FF41&color_dots=#003300,#004d00,#006600,#009900,#00cc00

            # 🧊 Glass blue theme
            dist/github-snake-ice.svg?color_snake=#00f7ff&color_dots=#002f3f,#004f6b,#007a99,#00bcd4,#a0f0ff

            # 🔥 Fire theme
            dist/github-snake-fire.svg?color_snake=#ff4b5c&color_dots=#2b0000,#5c0000,#8b0000,#ff0000,#ff4b5c

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
