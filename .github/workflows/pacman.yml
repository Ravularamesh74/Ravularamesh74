name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pac-Man Graph
        uses: Platane/snk@v3
        with:
          github_user_name: Ravularamesh74
          
          # ✅ PACMAN STYLE COLORS
          outputs: |
            dist/pacman.svg?color_snake=#FFD700&color_dots=#00FF00,#00FF00,#00FF00,#00FF00,#00FF00
            dist/pacman-dark.svg?palette=github-dark&color_snake=#FFD700

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
